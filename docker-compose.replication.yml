  # SHARD 1 - REPLICA 2
  peacedb-shard-1-replica-2:
    build:
      context: ./PeaceDatabase
      dockerfile: Dockerfile
    container_name: peacedb-shard-1-replica-2
    hostname: peacedb-shard-1-replica-2
    environment:
