      - CURRENT_SHARD_ID=0
      - CURRENT_REPLICA_INDEX=2
      - REPLICATION_ENABLED=false
      # Raft consensus configuration
      - RAFT_ENABLED=true
      - RAFT_SELF_URL=http://peacedb-shard-0-replica-2:8080
      - RAFT_PEERS=http://peacedb-shard-0-primary:8080,http://peacedb-shard-0-replica-1:8080
      - RAFT_HEARTBEAT_MS=500
      - RAFT_ELECTION_MIN_MS=1500
      - RAFT_ELECTION_MAX_MS=3000
    volumes:
      - shard0_replica2_data:/data
    networks:
      - replication-net

  # ========================================
  # SHARD 1 - PRIMARY
