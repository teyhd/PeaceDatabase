# docker-compose.replication.yml
# Развёртывание PeaceDatabase в режиме репликации с автоматическим failover
#
# Запуск:
#   docker-compose -f docker-compose.replication.yml up --build
#
# Архитектура:
#   - peacedb-router: Координатор/роутер (единая точка входа)
#   - 3 шарда x 3 реплики = 9 узлов данных
#   - Кворумная запись: WriteQuorum=2 (2 из 3 реплик для успеха)
#   - Автоматический failover при падении primary

services:
  # ========================================
  # ROUTER - Координатор запросов
  # ========================================
  peacedb-router:
    build:
      context: ./PeaceDatabase
      dockerfile: Dockerfile
    container_name: peacedb-router
    hostname: peacedb-router
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Replication
      - STORAGE_MODE=Sharded
      # ReplicaSets configuration (matches appsettings.Replication.json structure)
      - Sharding__ReplicaSets__0__ShardId=0
      - Sharding__ReplicaSets__0__Primary=http://peacedb-shard-0-primary:8080
      - Sharding__ReplicaSets__0__Replicas__0=http://peacedb-shard-0-replica-1:8080
      - Sharding__ReplicaSets__0__Replicas__1=http://peacedb-shard-0-replica-2:8080
      - Sharding__ReplicaSets__1__ShardId=1
      - Sharding__ReplicaSets__1__Primary=http://peacedb-shard-1-primary:8080
      - Sharding__ReplicaSets__1__Replicas__0=http://peacedb-shard-1-replica-1:8080
      - Sharding__ReplicaSets__1__Replicas__1=http://peacedb-shard-1-replica-2:8080
      - Sharding__ReplicaSets__2__ShardId=2
      - Sharding__ReplicaSets__2__Primary=http://peacedb-shard-2-primary:8080
      - Sharding__ReplicaSets__2__Replicas__0=http://peacedb-shard-2-replica-1:8080
      - Sharding__ReplicaSets__2__Replicas__1=http://peacedb-shard-2-replica-2:8080
    ports:
      - "8080:8080"
    depends_on:
      peacedb-shard-0-primary:
        condition: service_healthy
      peacedb-shard-0-replica-1:
        condition: service_healthy
      peacedb-shard-0-replica-2:
        condition: service_healthy
      peacedb-shard-1-primary:
        condition: service_healthy
      peacedb-shard-1-replica-1:
        condition: service_healthy
      peacedb-shard-1-replica-2:
        condition: service_healthy
      peacedb-shard-2-primary:
        condition: service_healthy
      peacedb-shard-2-replica-1:
        condition: service_healthy
      peacedb-shard-2-replica-2:
        condition: service_healthy
    networks:
      - replication-net

  # ========================================
  # SHARD 0 - PRIMARY
  # ========================================
  peacedb-shard-0-primary:
    build:
      context: ./PeaceDatabase
      dockerfile: Dockerfile
    container_name: peacedb-shard-0-primary
    hostname: peacedb-shard-0-primary
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - STORAGE_MODE=File
      - STORAGE_DATA_ROOT=/data
      - SHARDING_ENABLED=false
      - CURRENT_SHARD_ID=0
      - CURRENT_REPLICA_INDEX=0
      - REPLICATION_ENABLED=false
      # Raft consensus configuration
      - RAFT_ENABLED=true
      - RAFT_SELF_URL=http://peacedb-shard-0-primary:8080
      - RAFT_PEERS=http://peacedb-shard-0-replica-1:8080,http://peacedb-shard-0-replica-2:8080
      - RAFT_HEARTBEAT_MS=500
      - RAFT_ELECTION_MIN_MS=1500
      - RAFT_ELECTION_MAX_MS=3000
    volumes:
      - shard0_primary_data:/data
    networks:
      - replication-net

  # SHARD 0 - REPLICA 1
  peacedb-shard-0-replica-1:
    build:
      context: ./PeaceDatabase
      dockerfile: Dockerfile
    container_name: peacedb-shard-0-replica-1
    hostname: peacedb-shard-0-replica-1
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - STORAGE_MODE=File
      - STORAGE_DATA_ROOT=/data
      - SHARDING_ENABLED=false
      - CURRENT_SHARD_ID=0
      - CURRENT_REPLICA_INDEX=1
      - REPLICATION_ENABLED=false
      # Raft consensus configuration
      - RAFT_ENABLED=true
      - RAFT_SELF_URL=http://peacedb-shard-0-replica-1:8080
      - RAFT_PEERS=http://peacedb-shard-0-primary:8080,http://peacedb-shard-0-replica-2:8080
      - RAFT_HEARTBEAT_MS=500
      - RAFT_ELECTION_MIN_MS=1500
      - RAFT_ELECTION_MAX_MS=3000
    volumes:
      - shard0_replica1_data:/data
    networks:
      - replication-net

  # SHARD 0 - REPLICA 2
  peacedb-shard-0-replica-2:
