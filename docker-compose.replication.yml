      - STORAGE_MODE=File
      - STORAGE_DATA_ROOT=/data
      - SHARDING_ENABLED=false
      - CURRENT_SHARD_ID=1
      - CURRENT_REPLICA_INDEX=1
      - REPLICATION_ENABLED=false
      # Raft consensus configuration
      - RAFT_ENABLED=true
      - RAFT_SELF_URL=http://peacedb-shard-1-replica-1:8080
      - RAFT_PEERS=http://peacedb-shard-1-primary:8080,http://peacedb-shard-1-replica-2:8080
