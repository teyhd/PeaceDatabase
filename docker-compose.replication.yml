volumes:
  shard0_primary_data:
  shard0_replica1_data:
  shard0_replica2_data:
  shard1_primary_data:
  shard1_replica1_data:
  shard1_replica2_data:
  shard2_primary_data:
  shard2_replica1_data:
  shard2_replica2_data:

